version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    environment:
      - PORT=8000
      - ENV=development
      - DATA_DIR=data
      - LEARNER_DB_PATH=learner.db
      - UPLOAD_DIR=uploads
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend
    restart: always

networks:
  default:
    name: ai-tutor-network
